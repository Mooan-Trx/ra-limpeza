<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.A LIMPEZA | Profissionalismo e Higiene</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --azul-claro: #f0f9ff;
            --azul-medio: #4facfe;
            --verde-suave: #2ecc71;
            --texto: #2c3e50;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: var(--texto);
            line-height: 1.6;
        }

        /* CABEÇALHO COM BOLHAS */
        header {
            position: relative;
            background: linear-gradient(135deg, #e0f7fa 0%, #e8f5e9 100%);
            padding: 60px 20px;
            text-align: center;
            overflow: hidden;
            border-bottom: 2px solid #f0f0f0;
        }

        .logo-img {
            height: 80px;
            position: relative;
            z-index: 10;
            margin-bottom: 15px;
        }

        header h1 {
            position: relative;
            z-index: 10;
            font-size: 2.5rem;
            color: #1a5f7a;
        }

        /* ANIMAÇÃO DE BOLHAS */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 6s infinite ease-in;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-400px); opacity: 0; }
        }

        /* SEÇÃO SOBRE PROFISSIONAL */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            display: flex;
            gap: 40px;
            padding: 0 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .conteudo { flex: 1; min-width: 300px; }
        
        .imagem-container { flex: 1; min-width: 300px; }
        
        .imagem-container img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { color: #1a5f7a; font-size: 2rem; margin-bottom: 20px; }

        .lista-beneficios {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .item { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .item i { color: var(--verde-suave); font-size: 1.2rem; }

        @media (max-width: 768px) {
            .container { flex-direction: column; text-align: center; }
            .lista-beneficios { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="bubble" style="width: 40px; height: 40px; left: 15%; animation-delay: 0s;"></div>
    <div class="bubble" style="width: 20px; height: 20px; left: 40%; animation-delay: 2s;"></div>
    <div class="bubble" style="width: 50px; height: 50px; left: 75%; animation-delay: 1s;"></div>
    
    <img src="logo.png" alt="R.A LIMPEZA" class="logo-img">
    <h1>Excelência em cada detalhe</h1>
</header>

<section class="container">
    <div class="conteudo">
        <h2>Sobre a R.A LIMPEZA</h2>
        <p>Elevamos o padrão de higienização no mercado corporativo. Entendemos que um ambiente limpo é sinônimo de saúde, produtividade e uma excelente primeira impressão.</p>
        
        <div class="lista-beneficios">
            <div class="item"><i class="fas fa-check-circle"></i> Equipe Treinada</div>
            <div class="item"><i class="fas fa-leaf"></i> Insumos Sustentáveis</div>
            <div class="item"><i class="fas fa-clock"></i> Pontualidade</div>
            <div class="item"><i class="fas fa-hand-holding-usd"></i> Gestão Transparente</div>
        </div>
    </div>

    <div class="imagem-container">
        <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6954?auto=format&fit=crop&w=800" alt="Limpeza Profissional">
    </div>
</section>

</body>
</html>
