<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.A LIMPEZA | Soluções Corporativas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Cores mais claras solicitadas */
            --azul-claro: #e0f7fa;
            --verde-claro: #e8f5e9;
            --azul-texto: #1a5f7a;
            --verde-detalhe: #2ecc71;
            --branco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        /* --- CABEÇALHO COM BOLHAS --- */
        header {
            position: relative;
            background: linear-gradient(135deg, var(--azul-claro), var(--verde-claro));
            padding: 40px 5%;
            overflow: hidden; /* Corta as bolhas que saem do topo */
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .logo-container {
            position: relative;
            z-index: 10; /* Fica acima das bolhas */
            margin-bottom: 15px;
        }

        .logo-img {
            height: 70px; /* Ajuste o tamanho da sua logo aqui */
            width: auto;
        }

        header h1 {
            color: var(--azul-texto);
            position: relative;
            z-index: 10;
            font-size: 2.2rem;
        }

        /* Animação das Bolhas */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: subir 6s infinite ease-in;
            z-index: 1;
        }

        @keyframes subir {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-400px); opacity: 0; }
        }

        /* --- SEÇÃO SOBRE --- */
        .sobre { padding: 80px 5%; background: white; }
        .container { max-width: 1100px; margin: 0 auto; display: flex; gap: 50px; align-items: center; flex-wrap: wrap; }
        
        .sobre-content { flex: 1; min-width: 300px; }
        .sobre-content h2 { color: var(--azul-texto); margin-bottom: 20px; font-size: 2rem; }
        
        .sobre-imagem { flex: 1; min-width: 300px; }
        .sobre-imagem img { 
            width: 100%; 
            border-radius: 20px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
        }

        .diferenciais { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .dif-item { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--azul-texto); }
        .dif-item i { color: var(--verde-detalhe); }

    </style>
</head>
<body>

<header>
    <div class="bubble" style="width: 40px; height: 40px; left: 10%; animation-delay: 0s;"></div>
    <div class="bubble" style="width: 20px; height: 20px; left: 25%; animation-delay: 2s;"></div>
    <div class="bubble" style="width: 50px; height: 50px; left: 70%; animation-delay: 1s;"></div>
    <div class="bubble" style="width: 30px; height: 30px; left: 85%; animation-delay: 4s;"></div>

    <div class="logo-container">
        <img src="logo.png" alt="R.A LIMPEZA" class="logo-img">
    </div>
    <h1>Excelência em cada detalhe</h1>
</header>

<section class="sobre">
    <div class="container">
        <div class="sobre-content">
            <h2>Sobre Nós</h2>
            <p>A <strong>R.A LIMPEZA</strong> eleva o padrão de higienização corporativa, focando em saúde e produtividade.</p>
            
            <div class="diferenciais">
                <div class="dif-item"><i class="fas fa-shield-alt"></i> Equipe Treinada</div>
                <div class="dif-item"><i class="fas fa-leaf"></i> Insumos Sustentáveis</div>
                <div class="dif-item"><i class="fas fa-clock"></i> Pontualidade</div>
                <div class="dif-item"><i class="fas fa-file-invoice-dollar"></i> Gestão</div>
            </div>
        </div>

        <div class="sobre-imagem">
            <img src="limpeza-profissional.jpg" alt="Limpeza Profissional">
        </div>
    </div>
</section>

</body>
</html>
